name: CI (CPU tests)

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  cpu-tests:
    name: Non-GPU unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CI deps (no torch, no GPU)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run all tests (Issue #12: full P3 coverage)
        run: python -m pytest tests/ -v --tb=short --timeout=120 -p no:warnings
