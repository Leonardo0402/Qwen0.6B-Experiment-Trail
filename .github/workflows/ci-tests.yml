name: CI (CPU tests)

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  cpu-tests:
    name: Non-GPU unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install CI deps (no torch, no GPU)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Evidence consistency + DAG parent-chain tests
        run: python -m pytest tests/test_p2_evidence_hardening.py -v --tb=short

      - name: Metrics / statistics tests
        run: python -m pytest tests/test_metrics.py -v --tb=short

      - name: Schema + dataset isolation tests
        run: python -m pytest tests/test_schemas.py tests/test_validators.py -v --tb=short
