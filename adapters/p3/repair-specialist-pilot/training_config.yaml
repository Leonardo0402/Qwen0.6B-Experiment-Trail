# P3 Repair Specialist Pilot — Issue #12 P7/P8
# GPU Smoke + Pilot: independent mode, max 2-5 steps for smoke, 50 for pilot.
# Results must NOT be reported as formal capability (GO_FOR_P3_PILOT_ONLY).
training_mode: independent  # Issue #12 P0: independent (not continual)
model_name_or_path: models/Qwen3-0.6B
initial_adapter: null  # Issue #12 P0: no P2 adapter

train_file: data/p3-curriculum/repair-specialist/train.jsonl
eval_file: data/p3-curriculum/validation-v2/validation.jsonl
output_dir: adapters/p3/repair-specialist-pilot
dataset_manifest: data/p3-curriculum/repair-specialist/manifest.json

# RTX 3050 4GB constraints
# Issue #12 P7: GPU smoke uses max_steps=3 (2-5 steps range)
# Issue #12 P8: Pilot uses max_steps=50 (max 0.25 epoch / 50 steps)
max_steps: 3  # GPU smoke (override to 50 for full pilot)
max_seq_length: 384
num_train_epochs: 2  # Ignored when max_steps > 0
learning_rate: 0.00003  # 3e-5 (Issue #12 P0: independent LR)
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 0.3

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8

bf16: true  # runtime_check: torch.cuda.is_bf16_supported() called in train_lora.py
fp16: false  # Only used if bf16 unsupported
gradient_checkpointing: true
use_cache: false

logging_steps: 1  # Log every step for smoke/pilot visibility
save_steps: 2  # Save checkpoint during smoke
eval_steps: 2
save_total_limit: 2

assistant_only_loss: true
truncation_policy: preserve_assistant

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

seed: 42
dataloader_num_workers: 0
report_to: none
