# Stage 3: Repair — 10% L0 + 20% L1 + 25% L2 + 45% L3
model_name_or_path: models/Qwen3-0.6B
output_dir: adapters/code-lora-v3-repair
train_file: data/splits/train.jsonl
eval_file: data/splits/validation.jsonl

max_seq_length: 256
num_train_epochs: 5
learning_rate: 0.0001
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 0.3

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4

fp16: false
bf16: true
gradient_checkpointing: true
use_cache: false

logging_steps: 5
save_steps: 50
eval_steps: 10
save_total_limit: null

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

seed: 42
dataloader_num_workers: 0
report_to: none
